name: Build and Release

on:
  push:
    branches: [master]
    tags:
      - 'v*'
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python -m unittest tests.test_pinyin tests.test_decorators tests.test_database -v

  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 PyInstaller

      - name: Build dictionary database
        run: python scripts/build_dict.py

      - name: Build Windows exe
        run: pyinstaller ChineseDict.spec --noconfirm

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChineseDict-Windows
          path: dist/ChineseDict.exe

  build-macos:
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt5 PyInstaller

      - name: Build dictionary database
        run: python scripts/build_dict.py

      - name: Build macOS app
        run: pyinstaller ChineseDict_macOS.spec --noconfirm

      - name: Create DMG
        run: |
          cd dist
          mkdir -p dmg_temp
          cp -R ChineseDict.app dmg_temp/
          ln -sf /Applications dmg_temp/Applications
          hdiutil create -volname "ChineseDict" -srcfolder dmg_temp -ov -format UDZO ChineseDict-macOS-ARM64.dmg

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChineseDict-macOS-ARM64
          path: dist/ChineseDict-macOS-ARM64.dmg

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: ChineseDict-Windows
          path: ./artifacts/

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ChineseDict-macOS-ARM64
          path: ./artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/ChineseDict.exe
            ./artifacts/ChineseDict-macOS-ARM64.dmg
          generate_release_notes: true
